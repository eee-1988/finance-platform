apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: node:18
          command: ["node","server.js"]

        - name: envoy
          image: envoyproxy/envoy